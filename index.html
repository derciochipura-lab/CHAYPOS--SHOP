<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAYPOS | Elite Store Beira</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --card: #121212;
            --whatsapp: #25d366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; line-height: 1.6; }

        /* CABEÇALHO SHAYPOS */
        header {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('Air Jordan branco.jpg.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            border-bottom: 4px solid var(--gold); padding: 20px;
        }

        .logo-box h1 {
            font-family: 'Montserrat', sans-serif; font-size: clamp(3.5rem, 12vw, 7rem);
            letter-spacing: 15px; color: var(--gold); font-weight: 900; margin: 0;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 25px; border: 1px solid var(--gold);
            max-width: 800px; margin-top: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .welcome-card h2 { color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
        .beira-badge { background: var(--gold); color: #000; padding: 5px 20px; border-radius: 50px; font-weight: 800; display: inline-block; margin-top: 15px; }

        /* FILTROS */
        .container { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }
        .filter-bar { text-align: center; margin-bottom: 50px; }
        .filter-btn {
            background: transparent; border: 2px solid #333; color: #fff;
            padding: 12px 30px; border-radius: 50px; cursor: pointer; margin: 5px;
            font-weight: 600; transition: 0.3s;
        }
        .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }

        /* VITRINE */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px; }
        .card { background: var(--card); border-radius: 25px; border: 1px solid #222; overflow: hidden; transition: 0.4s; position: relative; }
        .card:hover { transform: translateY(-15px); border-color: var(--gold); box-shadow: 0 15px 30px rgba(212,175,55,0.2); }
        
        .card img { width: 100%; height: 350px; object-fit: cover; transition: 0.6s; }
        .card:hover img { transform: scale(1.1); }

        .info { padding: 25px; text-align: center; }
        .category { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .info h3 { margin: 10px 0; font-size: 1.3rem; height: 40px; display: flex; align-items: center; justify-content: center; }
        
        .preco-tag { background: rgba(212, 175, 55, 0.1); padding: 10px; border-radius: 15px; margin: 15px 0; }
        .preco { font-size: 1.7rem; font-weight: 800; color: #fff; }

        .btn-buy {
            background: var(--whatsapp); color: #fff; text-decoration: none;
            padding: 15px; border-radius: 15px; display: flex; align-items: center;
            justify-content: center; gap: 10px; font-weight: 700; transition: 0.3s;
        }
        .btn-buy:hover { background: #1eb954; transform: scale(1.02); }

        /* WHATSAPP FLOAT */
        .wa-float {
            position: fixed; bottom: 40px; right: 40px; background: var(--whatsapp);
            width: 70px; height: 70px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 35px; color: #fff;
            z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.4); text-decoration: none;
        }

        /* FOOTER */
        footer { background: #050505; padding: 80px 20px; text-align: center; border-top: 1px solid #222; }
        .f-logo { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box"><h1>SHAYPOS</h1></div>
    <div class="welcome-card">
        <h2>ESTILO SEM LIMITES</h2>
        <p>Bem-vindo à Shaypos. Somos especialistas em trazer o que há de melhor em Sneakers, Moda Desportiva e Tecnologia para ti.</p>
        <p>Produtos selecionados com rigor para garantir a máxima qualidade.</p>
        <div class="beira-badge">LOJA OFICIAL - CIDADE DA BEIRA</div>
    </div>
</header>
