<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaypos | Loja Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --whatsapp: #25d366;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        header {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('Air Jordan branco.jpg.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 10px;
            color: var(--gold);
        }

        .welcome-msg {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .filter-container {
            text-align: center;
            margin: 40px 0;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 25px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--gold);
            color: #000;
        }

        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            border: 1px solid #222;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .info {
            padding: 20px;
            text-align: center;
        }

        .preco {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            margin: 10px 0;
        }

        .btn-buy {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--whatsapp);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--whatsapp);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #777;
            border-top: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <h1>SHAYPOS</h1>
        <div class="welcome-msg">
            <p>🇲🇿 Beira | Estilo & Qualidade</p>
        </div>
    </header>

    <div class="container">
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterItems('todos')">Todos</button>
            <button class="filter-btn" onclick="filterItems('sneakers')">Sneakers</button>
            <button class="filter-btn" onclick="filterItems('roupas')">Roupas</button>
            <button class="filter-btn" onclick="filterItems('outros')">Gadgets & Jogos</button>
        </div>

        <div class="vitrine">
            <div class="card" data-cat="outros">
                <img src="uno.jpg.jpg" alt="Jogo UNO">
                <div class="info"><h3>Jogo de Cartas UNO</h3><span class="preco">600 MT</span><a href="https://wa.me/258874055437?text=Quero+o+jogo+UNO" class="btn-buy">Pedir agora</a></div>
            </div>
            <div class="card" data-cat="outros">
                <img src="30 segundos.jpg.jpg" alt="30 Seconds">
                <div class="info"><h3>Jogo 30 Seconds</h3><span class="preco">2.800
