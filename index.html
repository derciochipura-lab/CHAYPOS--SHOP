<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaypos | Loja Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --whatsapp: #25d366;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* --- TELA DE BOAS-VINDAS --- */
        header {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('Air Jordan branco.jpg.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 10px;
            color: var(--gold);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .welcome-msg {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 50px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- FILTROS --- */
        .filter-container {
            text-align: center;
            margin: 40px 0;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 25px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--gold);
            color: #000;
        }

        /* --- VITRINE --- */
        .container {
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            border: 1px solid #222;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .info {
            padding: 20px;
            text-align: center;
        }

        .preco {
            display: block;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            margin: 10px 0;
        }

        .btn-buy {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--whatsapp);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--whatsapp);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            z-index: 1000;
            text-decoration: none;
            transition: 0.3s;
        }

        footer {
            text-align: center;
            padding: 60px 20px;
            color: #777;
            border-top: 1px solid #222;
        }
    </style>
</head>
